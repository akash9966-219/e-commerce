<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #f8fafc;
            --accent: #8da399;
            --text: #2d3436;
            --border: #edf2f7;
            --success: #38a169;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 50px; }

        .top-nav {
            height: 80px; background: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 4%; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.4rem; font-weight: 600; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; text-decoration: none; }

        main { padding: 40px 5%; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; }

        .billing-details, .order-summary {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid var(--border);
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #718096; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .discount-text { color: var(--success); font-weight: 600; }
        .total-row { border-top: 2px dashed var(--border); margin-top: 15px; padding-top: 15px; font-weight: 600; font-size: 1.1rem; }

        .delivery-estimate {
            background: #f0f4f2; padding: 15px; border-radius: 12px; margin-top: 20px;
            border-left: 4px solid var(--accent); font-size: 0.85rem;
        }

        .pay-btn {
            width: 100%; padding: 18px; background: #3399cc; color: white;
            border: none; border-radius: 15px; font-weight: 600; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
        }
        .pay-btn:hover { background: #2d86b3; }

        /* Receipt Modal Styles */
        #receiptView {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .receipt-card {
            background: white; width: 90%; max-width: 450px; padding: 40px; border-radius: 30px;
            text-align: center; position: relative; animation: slideUp 0.5s ease;
        }
        .success-icon { font-size: 3.5rem; color: #38a169; margin-bottom: 15px; }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media print {
            body * { visibility: hidden; }
            #receiptView, #receiptView * { visibility: visible; }
            #receiptView { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .no-print { display: none; }
        }

        @media (max-width: 800px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="products.html" class="logo">Aura</a>
        <div style="font-weight: 600; color: var(--accent); text-transform: uppercase; font-size: 0.8rem;">Checkout</div>
    </nav>

    <main>
        <section class="billing-details">
            <h2>Shipping Information</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="custName" placeholder="firstname" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="lastname">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="custEmail" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="custPhone" placeholder="**********" pattern="[0-9]{10}" required>
            </div>
            <div class="form-group">
                <label>Complete Address</label>
                <input type="text" id="custAddress" placeholder="Building, Street, City, ZIP" required>
            </div>
        </section>

        <section class="order-summary">
            <h2>Review Order</h2>
            <div id="itemList" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;"></div>
            
            <div class="total-area">
                <div class="summary-item"><span>Items Subtotal</span> <span id="sub">₹0</span></div>
                <div class="summary-item"><span>GST (7%)</span> <span id="gst">₹0</span></div>
                <div class="summary-item"><span>Service Fee</span> <span>₹50</span></div>
                <div class="summary-item discount-row" id="discRow" style="display:none;">
                    <span>Reward Applied</span> 
                    <span id="discAmt" class="discount-text">-₹0</span>
                </div>
                <div class="summary-item total-row"><span>Grand Total</span> <span id="grand">₹0</span></div>
            </div>

            <div class="delivery-estimate">
                📦 Arriving By: <strong id="deliveryDate">...</strong>
            </div>

            <button class="pay-btn" onclick="startPayment()">Pay ₹<span id="btnAmt">0</span></button>
        </section>
    </main>

    <div id="receiptView">
        <div class="receipt-card">
            <div class="success-icon no-print">✓</div>
            <h2 style="border:none">Order Confirmed</h2>
            <p style="font-size:0.8rem; margin-bottom:20px; color: #718096;">Ref ID: <span id="transId"></span></p>
            
            <div style="text-align: left; background: #f8fafc; padding: 20px; border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--border);">
                <div class="summary-item"><strong>Customer:</strong> <span id="rcptName"></span></div>
                <div class="summary-item"><strong>Date:</strong> <span id="rcptDate"></span></div>
                <div class="summary-item"><strong>Delivery:</strong> <span id="rcptDeliv"></span></div>
                <div class="summary-item" style="border-top:1px solid #edf2f7; padding-top:10px; margin-top:10px;">
                    <strong>Amount Paid:</strong> <span id="rcptAmt" style="font-weight:600; color:var(--text);"></span>
                </div>
            </div>

            <div class="no-print" style="display: flex; flex-direction: column; gap: 12px;">
                <button class="pay-btn" style="background:#2d3436; margin:0;" onclick="window.print()">Download Invoice</button>
                <button class="pay-btn" style="background:var(--accent); margin:0;" onclick="location.href='order-history.html'">View Order History</button>
            </div>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = 'https://newtlkztpiztbhpdbnqw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8pkhrkGcBVs5nw__Z8AGBw_1VB3VtUg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let finalGrandTotal = 0;
        let deliveryStr = "";

        function loadSummary() {
            const cart = JSON.parse(localStorage.getItem('aura_cart')) || [];
            const discount = parseInt(localStorage.getItem('aura_applied_discount')) || 0;

            if(cart.length === 0) {
                alert("Your bag is empty!");
                window.location.href = "products.html";
                return;
            }

            let subtotal = 0;
            const container = document.getElementById('itemList');
            
            container.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                return `<div class="summary-item">
                    <span>${item.name} (x${item.qty})</span>
                    <span>₹${itemTotal.toLocaleString()}</span>
                </div>`;
            }).join('');

            const tax = Math.round(subtotal * 0.07); // 7% GST
            const serviceFee = 50;
            finalGrandTotal = (subtotal + tax + serviceFee) - discount;

            document.getElementById('sub').innerText = "₹" + subtotal.toLocaleString();
            document.getElementById('gst').innerText = "₹" + tax.toLocaleString();
            
            if (discount > 0) {
                document.getElementById('discRow').style.display = 'flex';
                document.getElementById('discAmt').innerText = "-₹" + discount.toLocaleString();
            }

            document.getElementById('grand').innerText = "₹" + finalGrandTotal.toLocaleString();
            document.getElementById('btnAmt').innerText = finalGrandTotal.toLocaleString();

            const d = new Date();
            d.setDate(d.getDate() + 4);
            deliveryStr = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('deliveryDate').innerText = deliveryStr;
        }

        function startPayment() {
            const firstName = document.getElementById('custName').value;
            const email = document.getElementById('custEmail').value;
            const phone = document.getElementById('custPhone').value;

            if(!firstName || !email || phone.length < 10) {
                alert("Please complete the shipping details correctly.");
                return;
            }

            const options = {
                "key": "rzp_test_SZT6kT7wM3qjVI",
                "amount": Math.round(finalGrandTotal * 100), 
                "currency": "INR",
                "name": "Aura Luxury Store",
                "description": "Premium Goods Checkout",
                "handler": function (response) {
                    saveOrderToCloud(response.razorpay_payment_id);
                },
                "prefill": {
                    "name": firstName,
                    "email": email,
                    "contact": phone
                },
                "theme": { "color": "#8da399" }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        }

        async function saveOrderToCloud(id) {
            const firstName = document.getElementById('custName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('custEmail').value;
            const cart = JSON.parse(localStorage.getItem('aura_cart')) || [];

            await supabaseClient
                .from('orders')
                .insert([
                    { 
                        customer_name: firstName + " " + lastName,
                        customer_email: email,
                        amount: finalGrandTotal, 
                        payment_id: id, 
                        items: cart 
                    }
                ]);

            showReceiptUI(id);
        }

        function showReceiptUI(id) {
            document.getElementById('transId').innerText = id;
            document.getElementById('rcptName').innerText = document.getElementById('custName').value + " " + document.getElementById('lastName').value;
            document.getElementById('rcptAmt').innerText = "₹" + finalGrandTotal.toLocaleString();
            document.getElementById('rcptDate').innerText = new Date().toLocaleString('en-IN');
            document.getElementById('rcptDeliv').innerText = deliveryStr;
            
            document.getElementById('receiptView').style.display = 'flex';
            
            // CLEAR DATA AFTER SUCCESS
            localStorage.removeItem('aura_cart'); 
            localStorage.removeItem('aura_applied_discount');
        }

        loadSummary();
    </script>
</body>
</html>
