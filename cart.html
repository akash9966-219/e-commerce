<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Your Bag</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --accent: #8da399;
            --text: #2d3436;
            --border: #edf2f7;
            --glass: rgba(255, 255, 255, 0.95);
            --success: #38a169;
            --error: #e53e3e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }

        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 80px;
            background: var(--glass); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 4%; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.4rem; font-weight: 600; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; text-decoration: none; }

        main { padding: 120px 8% 5rem; max-width: 1200px; margin: 0 auto; display: flex; gap: 40px; }

        .cart-items-container { flex: 2; }
        .cart-item {
            background: white; border-radius: 20px; padding: 20px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02); animation: fadeIn 0.5s ease;
            position: relative;
        }
        .cart-item img { width: 90px; height: 110px; object-fit: cover; border-radius: 12px; }
        .item-details { flex: 1; }
        
        .cart-qty-controls {
            display: flex; align-items: center; gap: 12px; margin-top: 10px;
            background: #f8fafc; width: fit-content; padding: 5px 12px; border-radius: 10px;
        }
        .qty-btn { cursor: pointer; border: none; background: none; color: var(--accent); font-weight: 600; font-size: 1.1rem; }

        .remove-item {
            position: absolute; top: 20px; right: 20px; cursor: pointer;
            color: var(--error); font-size: 1.2rem; opacity: 0.6; transition: 0.3s;
        }

        .checkout-card {
            flex: 1; background: white; border-radius: 25px; padding: 30px;
            height: fit-content; position: sticky; top: 120px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border);
        }

        .flash-offer-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 12px; background: #fff5f5;
            border: 1px dashed #fc8181; border-radius: 12px;
            color: #c53030; text-decoration: none; font-weight: 700;
            font-size: 0.75rem; margin-bottom: 20px;
            animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .coupon-section { margin: 20px 0; border-top: 1px solid var(--border); padding-top: 20px; }
        .coupon-input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .coupon-input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); outline: none; font-size: 0.85rem; }
        .apply-btn { padding: 0 15px; background: var(--text); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.7rem; }
        .coupon-msg { font-size: 0.7rem; font-weight: 700; display: none; margin-bottom: 10px; line-height: 1.4; }

        .price-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: #718096; font-size: 0.9rem; }
        .discount-row { color: var(--success); display: none; font-weight: 600; }
        .total-row { border-top: 1px solid var(--border); padding-top: 15px; margin-top: 15px; font-weight: 600; font-size: 1.1rem; color: var(--text); }

        .checkout-btn { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 600; margin-top: 10px; cursor: pointer; display: block; text-align: center; text-decoration: none; }

        .empty-msg { text-align: center; padding: 50px; color: #a0aec0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) { main { flex-direction: column; } .checkout-card { position: relative; top: 0; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="products.html" class="logo">Aura</a>
        <div style="font-size: 0.8rem; color: var(--accent); font-weight: 600;">REVIEW BAG</div>
    </nav>

    <main id="cart-main">
        <div class="cart-items-container" id="cartList"></div>

        <div class="checkout-card">
            <h2>Order Summary</h2>
            
            <a href="coupon.html" class="flash-offer-btn">🎟️ COLLECT PRIVILEGE REWARDS</a>

            <div class="price-row"><span>Items Subtotal</span><span id="subtotal">₹0</span></div>
            <div class="price-row"><span>GST (7%)</span><span id="gst">₹0</span></div>
            <div class="price-row"><span>Service Fee</span><span id="maint">₹50</span></div>

            <div class="coupon-section">
                <div class="coupon-input-group">
                    <input type="text" id="couponInput" class="coupon-input" placeholder="Paste reward code here...">
                    <button class="apply-btn" onclick="applyCoupon()">APPLY</button>
                </div>
                <div id="couponMsg" class="coupon-msg"></div>
            </div>

            <div class="price-row discount-row" id="discountRow">
                <span>Reward Applied</span>
                <span id="discountAmt">-₹0</span>
            </div>

            <div class="total-row price-row">
                <span>Grand Total</span>
                <span id="total-amt">₹0</span>
            </div>

            <a href="payment.html" class="checkout-btn">Continue to Payment</a>
        </div>
    </main>

    <script>
        let currentSubtotal = 0;
        let appliedDiscount = 0;

        // Reset discount on every fresh page load to ensure clean math
        localStorage.setItem('aura_applied_discount', 0);

        function renderCart() {
            const cartItems = JSON.parse(localStorage.getItem('aura_cart')) || [];
            const list = document.getElementById('cartList');
            currentSubtotal = 0;

            if (cartItems.length === 0) {
                list.innerHTML = `<div class="empty-msg"><h3>Your bag is empty</h3><br><a href="products.html" style="color:var(--accent); text-decoration:none;">Go Shopping →</a></div>`;
                updateUI(0);
                return;
            }

            list.innerHTML = cartItems.map((item, index) => {
                const itemTotal = item.price * item.qty;
                currentSubtotal += itemTotal;
                return `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-details">
                            <h3 style="font-size:0.9rem">${item.name}</h3>
                            <p>Size: ${item.size}</p>
                            <div class="cart-qty-controls">
                                <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
                                <span class="qty-num">${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                            </div>
                            <p style="color:var(--accent); font-weight:600; margin-top:8px;">₹${itemTotal.toLocaleString()}</p>
                        </div>
                        <span class="remove-item" onclick="removeItem(${index})">✕</span>
                    </div>`;
            }).join('');
            updateUI(currentSubtotal);
        }

        function applyCoupon() {
            const code = document.getElementById('couponInput').value.trim().toUpperCase();
            const msg = document.getElementById('couponMsg');
            const row = document.getElementById('discountRow');

            // 1. Threshold logic based on Grand Total (Inclusive of 7% GST)
            const currentGst = Math.round(currentSubtotal * 0.07);
            const currentMaint = currentSubtotal > 0 ? 50 : 0;
            const preDiscountTotal = currentSubtotal + currentGst + currentMaint;

            const rewards = {
                'AURA200':  { discount: 200,  min: 5000 },
                'AURA450':  { discount: 450,  min: 25000 },
                'AURA1200': { discount: 1200, min: 75000 },
                'AURA2500': { discount: 2500, min: 100000 }
            };

            const activeReward = rewards[code];

            if (!activeReward) {
                setMsg("INVALID REWARD CODE", "var(--error)");
                resetDiscount();
                updateUI(currentSubtotal);
                return;
            }

            if (preDiscountTotal >= activeReward.min) {
                appliedDiscount = activeReward.discount;
                
                // SAVE DISCOUNT TO LOCALSTORAGE FOR PAYMENT.HTML
                localStorage.setItem('aura_applied_discount', appliedDiscount);
                
                setMsg("SUCCESS: ₹" + appliedDiscount + " REWARD APPLIED!", "var(--success)");
                row.style.display = "flex";
                document.getElementById('discountAmt').innerText = "-₹" + appliedDiscount;
            } else {
                const diff = activeReward.min - preDiscountTotal;
                setMsg("GRAND TOTAL MUST REACH ₹" + activeReward.min.toLocaleString() + ". ADD ₹" + diff.toLocaleString() + " MORE.", "var(--error)");
                resetDiscount();
            }
            updateUI(currentSubtotal);
        }

        function setMsg(txt, color) {
            const m = document.getElementById('couponMsg');
            m.innerText = txt; m.style.color = color; m.style.display = "block";
        }

        function resetDiscount() {
            appliedDiscount = 0;
            localStorage.setItem('aura_applied_discount', 0);
            document.getElementById('discountRow').style.display = "none";
        }

        function updateUI(sub) {
            const gst = Math.round(sub * 0.07);
            const maint = sub > 0 ? 50 : 0;
            const final = (sub + gst + maint) - appliedDiscount;
            
            document.getElementById('subtotal').innerText = "₹" + sub.toLocaleString();
            document.getElementById('gst').innerText = "₹" + gst.toLocaleString();
            document.getElementById('maint').innerText = "₹" + maint.toLocaleString();
            document.getElementById('total-amt').innerText = "₹" + (final < 0 ? 0 : final).toLocaleString();
        }

        function changeQty(i, d) {
            let c = JSON.parse(localStorage.getItem('aura_cart'));
            c[i].qty += d;
            if (c[i].qty < 1) c.splice(i, 1);
            localStorage.setItem('aura_cart', JSON.stringify(c));
            resetDiscount(); // Recalculate if quantity changes
            renderCart();
        }

        function removeItem(i) {
            let c = JSON.parse(localStorage.getItem('aura_cart'));
            c.splice(i, 1);
            localStorage.setItem('aura_cart', JSON.stringify(c));
            resetDiscount();
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
