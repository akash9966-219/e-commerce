<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Experience Refinement</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --accent: #8da399; --text: #2d3436; --border: #edf2f7; --glass: rgba(255, 255, 255, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid white; padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); transition: 0.3s; }
        .logo { font-size: 1.8rem; font-weight: 600; letter-spacing: 8px; color: var(--accent); text-transform: uppercase; text-decoration: none; display: block; text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; background: #edf2f7; padding: 5px; border-radius: 15px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 12px; font-size: 0.85rem; font-weight: 600; color: #718096; transition: 0.3s; }
        .tab.active { background: white; color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: #718096; margin-bottom: 5px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 12px; outline: none; transition: 0.3s; background: white; }
        input:focus { border-color: var(--accent); }
        .btn-auth { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-auth:hover { background: #2d3436; }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">Aura</div>
        <div class="tabs">
            <div class="tab active" id="t-login" onclick="setMode('login')">Login</div>
            <div class="tab" id="t-reg" onclick="setMode('reg')">Register</div>
        </div>
        <form id="authForm" onsubmit="handleAuth(event)">
            <div id="reg-box" style="display:none">
                <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Akash Mondal"></div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" id="email" required placeholder="name@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="pass" required placeholder="••••••••"></div>
            <button type="submit" class="btn-auth" id="btn-text">Sign In</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // IMPLEMENTING YOUR SPECIFIC CREDENTIALS
        const SUPABASE_URL = 'https://newtlkztpiztbhpdbnqw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8pkhrkGcBVs5nw__Z8AGBw_1VB3VtUg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let mode = 'login';

        // Auto-check if user is already logged in
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                console.log("Session active for:", session.user.email);
                // Optional: window.location.href = "products.html";
            }
        };

        function setMode(m) {
            mode = m;
            document.getElementById('reg-box').style.display = m === 'reg' ? 'block' : 'none';
            document.getElementById('btn-text').innerText = m === 'reg' ? 'Create Account' : 'Sign In';
            document.getElementById('t-login').classList.toggle('active', m === 'login');
            document.getElementById('t-reg').classList.toggle('active', m === 'reg');
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const btn = document.getElementById('btn-text');

            btn.disabled = true;
            btn.innerText = "Processing...";

            if (mode === 'reg') {
                const fullName = document.getElementById('name').value;
                const { data, error } = await supabaseClient.auth.signUp({ 
                    email, 
                    password, 
                    options: { data: { full_name: fullName } } 
                });
                
                if (error) {
                    alert("Error: " + error.message);
                } else {
                    alert("Registration Successful! Use the Login tab to enter.");
                    setMode('login');
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                
                if (error) {
                    alert("Login Error: " + error.message);
                } else {
                    // Success! Redirect to products
                    window.location.href = "products.html";
                }
            }
            btn.disabled = false;
            btn.innerText = mode === 'reg' ? 'Create Account' : 'Sign In';
        }
    </script>
</body>
</html>
